name = "t3yt"

compatibility_date = "2026-04-10"
compatibility_flags = ["nodejs_compat"]

main = "worker/src/index.js"

routes = [
  { pattern = "t3yt.mikepfunk.com", custom_domain = true }
]

[env.preview]
name = "t3yt-preview"

[observability]
enabled = false

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
