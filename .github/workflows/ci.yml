name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'fix/**', 'feat/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  service:
    name: Service — syntax + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check (node -c)
        run: npm run syntax-check
      - name: Run tests (node --test)
        run: npm test

  extension:
    name: Extension — syntax + manifest parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check all extension JS
        run: |
          node -c extension/content.js
          node -c extension/popup.js
          node -c extension/options.js
          node -c extension/background.js
      - name: Manifest JSON parse
        run: node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json','utf8'))"

  worker:
    name: Worker — syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check worker
        run: node -c worker/src/index.js
