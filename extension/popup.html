<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TheoChat</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="rig">
    <header class="rig__head">
      <div class="wordmark">
        <span class="wordmark__t">THEO</span><span class="wordmark__dot"></span><span class="wordmark__c">CHAT</span>
      </div>
      <div class="version" id="version">v1.0</div>
    </header>

    <section class="signals" aria-label="Status signals">
      <div class="signal" data-signal="service">
        <span class="signal__led" data-state="idle"></span>
        <span class="signal__label">SERVICE</span>
        <span class="signal__value" id="svcState">—</span>
      </div>
      <div class="signal" data-signal="youtube">
        <span class="signal__led" data-state="idle"></span>
        <span class="signal__label">YOUTUBE</span>
        <span class="signal__value" id="ytState">—</span>
      </div>
      <div class="signal" data-signal="twitch">
        <span class="signal__led" data-state="idle"></span>
        <span class="signal__label">INJECT</span>
        <span class="signal__value" id="twState">—</span>
      </div>
    </section>

    <section class="master">
      <button id="toggle" class="toggle" aria-pressed="true">
        <span class="toggle__track">
          <span class="toggle__thumb"></span>
        </span>
        <span class="toggle__legend">
          <span class="toggle__state" id="toggleState">BRIDGE ON</span>
          <span class="toggle__hint" id="toggleHint">Injecting YouTube into Twitch chat</span>
        </span>
      </button>
    </section>

    <section class="delay">
      <header class="delay__head">
        <h2 class="delay__title">MOD SAFETY WINDOW</h2>
        <output class="delay__readout" id="delayReadout">30s</output>
      </header>
      <input type="range" id="delaySlider" min="30" max="30" step="1" value="30" class="delay__slider" aria-label="Delay in seconds" disabled>
      <div class="delay__ticks" aria-hidden="true">
        <span>locked</span><span>30s</span><span>moderation-safe</span>
      </div>
      <p class="delay__explain" id="delayExplain">Messages are held 30s before appearing, and only release after a moderation reconciliation pass. This safety window is locked on.</p>
    </section>

    <section class="telemetry">
      <div class="telemetry__cell">
        <span class="telemetry__val" id="statPending">0</span>
        <span class="telemetry__key">BUFFERED</span>
      </div>
      <div class="telemetry__cell">
        <span class="telemetry__val" id="statCount">0</span>
        <span class="telemetry__key">TODAY</span>
      </div>
      <div class="telemetry__cell">
        <span class="telemetry__val" id="statLast">—</span>
        <span class="telemetry__key">LAST MSG</span>
      </div>
    </section>

    <div class="alert" id="alert" data-state="idle" hidden>
      <span class="alert__led"></span>
      <span class="alert__text" id="alertText">—</span>
      <button id="reconnectBtn" type="button" class="alert__btn">RECONNECT</button>
    </div>

    <footer class="rig__foot">
      <a id="openOptions" href="#" class="foot__link">Advanced</a>
      <span class="foot__stamp" id="endpoint">—</span>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
