<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TheoChat OBS Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #efeff1;
      overflow: hidden;
    }
    #chat {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100vh;
      padding: 8px;
    }
    .msg {
      padding: 4px 8px;
      margin-bottom: 2px;
      line-height: 1.4;
      word-wrap: break-word;
      animation: fadeIn 0.15s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
      margin-right: 4px;
      vertical-align: middle;
    }
    .badge-yt { background: #ff0000; color: #fff; }
    .badge-owner { background: #ffd600; color: #000; }
    .badge-mod { background: #5e84f1; color: #fff; }
    .badge-member { background: #2ba640; color: #fff; }
    .badge-sc { background: #f57c00; color: #fff; }
    .avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 4px;
    }
    .author {
      font-weight: 700;
      margin-right: 4px;
    }
    .system {
      color: #adadb8;
      font-style: italic;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
  <div id="chat"></div>
  <script>
    const MAX_MESSAGES = 50;
    const chat = document.getElementById('chat');

    // Read token from URL params: /overlay?token=xxx
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';

    // Build WebSocket URL relative to current host
    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsBase = proto + '//' + window.location.host;
    const wsUrl = token ? wsBase + '?token=' + encodeURIComponent(token) : wsBase;

    let ws = null;

    function connect() {
      ws = new WebSocket(wsUrl);

      ws.onopen = function() {
        addSystem('TheoChat overlay connected');
      };

      ws.onmessage = function(e) {
        try {
          var event = JSON.parse(e.data);
          handleEvent(event);
        } catch (err) { /* ignore parse errors */ }
      };

      ws.onclose = function() {
        setTimeout(connect, 3000);
      };

      ws.onerror = function() {
        ws.close();
      };
    }

    function handleEvent(event) {
      switch (event.type) {
        case 'yt.message.created':
          addMessage(event);
          break;
        case 'yt.message.deleted':
          removeMessage(event.messageId);
          break;
        case 'yt.user.banned':
          removeUser(event.userId, event.bannedMessageIds || []);
          break;
        case 'yt.chat.ended':
          addSystem('YouTube live chat ended');
          break;
      }
    }

    function createBadge(text, className) {
      var span = document.createElement('span');
      span.className = 'badge ' + className;
      span.textContent = text;
      return span;
    }

    function addMessage(event) {
      var el = document.createElement('div');
      el.className = 'msg';
      el.setAttribute('data-msg-id', event.messageId);
      el.setAttribute('data-user-id', event.userId);

      // YT badge
      el.appendChild(createBadge('YT', 'badge-yt'));

      // Role badges
      for (var i = 0; i < event.badges.length; i++) {
        var badge = event.badges[i];
        if (badge === 'owner') el.appendChild(createBadge('Owner', 'badge-owner'));
        else if (badge === 'moderator') el.appendChild(createBadge('Mod', 'badge-mod'));
        else if (badge === 'member') el.appendChild(createBadge('Member', 'badge-member'));
      }

      // Super chat badge
      if (event.isSuperChat && event.superChatAmount) {
        el.appendChild(createBadge(event.superChatAmount, 'badge-sc'));
      }

      // Avatar
      if (event.profileImageUrl) {
        var img = document.createElement('img');
        img.className = 'avatar';
        img.src = event.profileImageUrl;
        img.alt = '';
        el.appendChild(img);
      }

      // Author name
      var author = document.createElement('span');
      author.className = 'author';
      author.style.color = nameColor(event.displayName);
      author.textContent = event.displayName;
      el.appendChild(author);

      // Separator
      var sep = document.createElement('span');
      sep.textContent = ': ';
      el.appendChild(sep);

      // Message text
      var text = document.createElement('span');
      text.textContent = event.text;
      el.appendChild(text);

      chat.appendChild(el);
      pruneMessages();
      chat.scrollTop = chat.scrollHeight;
    }

    function removeMessage(messageId) {
      var el = chat.querySelector('[data-msg-id="' + CSS.escape(messageId) + '"]');
      if (el) el.remove();
    }

    function removeUser(userId, bannedMessageIds) {
      var els = chat.querySelectorAll('[data-user-id="' + CSS.escape(userId) + '"]');
      for (var i = 0; i < els.length; i++) els[i].remove();
      for (var j = 0; j < bannedMessageIds.length; j++) {
        var el = chat.querySelector('[data-msg-id="' + CSS.escape(bannedMessageIds[j]) + '"]');
        if (el) el.remove();
      }
    }

    function addSystem(text) {
      var el = document.createElement('div');
      el.className = 'system';
      el.textContent = text;
      chat.appendChild(el);
      pruneMessages();
    }

    function pruneMessages() {
      while (chat.children.length > MAX_MESSAGES) {
        chat.children[0].remove();
      }
    }

    function nameColor(name) {
      var colors = [
        '#ff4444','#ff7f50','#ff69b4','#b8860b','#5f9ea0',
        '#1e90ff','#8a2be2','#00ff7f','#daa520','#d2691e',
        '#008000','#9acd32','#2e8b57','#da70d6','#e0b619'
      ];
      var hash = 0;
      for (var i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return colors[Math.abs(hash) % colors.length];
    }

    connect();
  </script>
</body>
</html>
